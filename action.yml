name: bears
description: abc
author: def

inputs:
  gh_token:
    description: "GitHub Token"
    required: true
  gh_username:
    description: "GitHub Username"
    required: true

  tags_to_observe:
    description: "tags to observe"
    required: false
    default: "project,hackathon"
  stylesheet:
    description: ""
    required: false
    default: "main.css"

  assets_folder:
    description: ""
    required: false
    default: "images"

  output_html:
    description: ""
    required: false
    default: "index.html"

  cache_file:
    description: ""
    required: false
    default: "data.json"

  template:
    description: ""
    required: false
    default: "index.html"

  title:
    description: ""
    required: false
    default: "{{ user.name }} — Portfolio"

  watch:
    description: ""
    required: false
    default: "false"

  tailwind_input:
    description: ""
    required: false
    default: "input.css"

  tailwind_minify:
    description: ""
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    #
    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ github.action_path }}/requirements.txt" ]; then 
          pip install -r ${{ github.action_path }}/requirements.txt
        fi
      shell: bash

    #
    - name: Download Tailwind CLI
      run: |
        mkdir -p .tailwind
        curl -L https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o .tailwind/tailwind
        chmod +x .tailwind/tailwind
      shell: bash

    #
    - name: Build CSS
      run: |
        MINIFY_FLAG=""
        if [ "${{ inputs.tailwind_minify }}" = "true" ]; then
          MINIFY_FLAG="--minify"
        fi

        .tailwind/tailwind \
          -i ${{ github.action_path }}/${{ inputs.tailwind_input }} \
          -o ${{ inputs.stylesheet }} \
          $MINIFY_FLAG
      shell: bash

    #
    - name: Generate HTML
      run: python ${{ github.action_path }}/index.py ${{ inputs.watch == 'true' &&
        '--watch' || '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        GH_USERNAME: ${{ inputs.gh_username }}
        TAGS: ${{ inputs.tags_to_observe }}
        ASSETS_FOLDER: ${{ inputs.assets_folder }}
        CACHE_FILE: ${{ inputs.cache_file }}
        OUTPUT_HTML: ${{ inputs.output_html }}
        TEMPLATE_NAME: ${{ inputs.template }}
        TITLE: ${{ inputs.title }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}

branding:
  icon: "award"
  color: "green"
