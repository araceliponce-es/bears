name: bears
description: Generate a GitHub portfolio from tagged repositories
author: araceliponce-es

inputs:
  gh_token:
    description: "GitHub Token"
    required: true

  gh_username:
    description: "GitHub Username"
    required: true

  config:
    description: "Configuration file"
    required: false
    default: "bears.yml"

  watch:
    description: "Refresh cache and regenerate"
    required: false
    default: "false"

runs:
  using: "composite"

  steps:
    - name: Install Python deps
      shell: bash
      run: |
        python -m pip install --upgrade pip

        if [ -f "${{ github.action_path }}/requirements.txt" ]; then
          pip install -r "${{ github.action_path }}/requirements.txt"
        fi

    - name: Load Bears configuration
      shell: bash
      run: |
        python "${{ github.action_path }}/config_env.py" \
          "${{ inputs.config }}"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}

    - name: Download Tailwind CLI
      shell: bash
      run: |
        mkdir -p .tailwind

        curl -L \
          https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 \
          -o .tailwind/tailwind

        chmod +x .tailwind/tailwind

    - name: Build CSS
      shell: bash
      run: |

        MINIFY_FLAG=""

        if [ "$TAILWIND_MINIFY" = "true" ]; then
          MINIFY_FLAG="--minify"
        fi


        .tailwind/tailwind \
          -i "${{ github.action_path }}/$TAILWIND_SOURCE" \
          -o "$TAILWIND_OUTPUT" \
          $MINIFY_FLAG

    - name: Generate HTML
      shell: bash
      run: |
        python "${{ github.action_path }}/index.py" \
        ${{ inputs.watch == 'true' && '--watch' || '' }}

      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        GH_USERNAME: ${{ inputs.gh_username }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}

branding:
  icon: award
  color: green
